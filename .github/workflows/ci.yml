name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Run linter and save results
        run: npm run lint --if-present > lint-results.txt 2>&1 || true
        continue-on-error: true
      
      - name: Run tests with coverage and save results
        timeout-minutes: 15
        run: |
          npm run test:coverage -- --run || true
        continue-on-error: true
        env:
          ESLINT_NO_DEV_ERRORS: true
          DISABLE_ESLINT_PLUGIN: true
          NODE_ENV: test
      
      - name: Verify coverage generation
        if: always()
        timeout-minutes: 5
        run: |
          echo "📊 Checking coverage output..."
          ls -la || true
          if [ -d "coverage" ]; then
            echo "✅ Coverage directory exists:"
            ls -laR coverage/ | head -50 || true
          else
            echo "❌ No coverage directory found"
            echo "Coverage was not generated by the test run"
          fi
          echo "📁 Test output files:"
          ls -la test-results.json 2>/dev/null || echo "No test-results.json"
          ls -la lint-results.txt 2>/dev/null || echo "No lint-results.txt"
      
      - name: Upload all test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            coverage/
            test-results.json
            lint-results.txt
            **/*.coverage*
          retention-days: 30
          if-no-files-found: warn
      
      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true
